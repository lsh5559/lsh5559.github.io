<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1b1b1b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── 로고 ── */
    .logo-wrap {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards;
    }

    .logo-wrap img {
      width: clamp(36px, 8vw, 70px);
      display: block;
    }

    /* ── 로딩 바 ── */
    .bar-wrap {
      margin-top: 2.8rem;
      width: clamp(120px, 28vw, 240px);
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
    }

    .bar-track {
      width: 100%;
      height: 1px;
      background: rgba(255, 255, 255, 0.15);
      position: relative;
      overflow: hidden;
    }

    .bar-fill {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 0%;
      background: #ffffff;
      transition: width 0.05s linear;
    }

    /* ── 퍼센트 숫자 ── */
    .bar-pct {
      margin-top: 0.9rem;
      text-align: right;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.4);
    }

    /* ── 페이드아웃 (완료 시) ── */
    body.done {
      opacity: 0;
      transition: opacity 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <img src="images/logo.png" alt="Logo">
  </div>

  <div class="bar-wrap">
    <div class="bar-track">
      <div class="bar-fill" id="bar-fill"></div>
    </div>
    <p class="bar-pct" id="bar-pct">0%</p>
  </div>

  <script>
    const fill = document.getElementById('bar-fill');
    const pct  = document.getElementById('bar-pct');

    let progress = 0;

    /* 불규칙한 속도로 채워져 자연스럽게 보임 */
    function step() {
      if (progress >= 100) {
        fill.style.width = '100%';
        pct.textContent  = '100%';

        /* 잠깐 멈췄다가 페이드아웃 후 이동 */
        setTimeout(() => {
          document.body.classList.add('done');
          setTimeout(() => {
            window.location.href = 'main.html';
          }, 580);
        }, 300);
        return;
      }

      /* 남은 거리의 일부씩 채움 — 처음엔 빠르고 끝으로 갈수록 느려짐 */
      const remaining = 100 - progress;
      const increment = Math.random() * Math.min(remaining * 0.12, 4) + 0.4;
      progress = Math.min(progress + increment, 100);

      fill.style.width = progress + '%';
      pct.textContent  = Math.floor(progress) + '%';

      const delay = 30 + Math.random() * 40;
      setTimeout(step, delay);
    }

    /* 로고 등장 후 바 시작 */
    setTimeout(step, 700);
  </script>

</body>
</html>
