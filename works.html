<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Works — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/works.css">
</head>
<body class="works-body">

  <header class="admin-toolbar">
    <div class="admin-toolbar-left">
      <a href="index.html" class="nav-btn">← Back</a>
      <span class="page-title-works">Works</span>
    </div>
    <div class="admin-toolbar-right">
      <button id="btn-add"    class="nav-btn btn-add">+ 새 작업 추가</button>
      <button id="btn-import" class="nav-btn btn-import">코드 불러오기</button>
      <input  type="file" id="import-file-input" accept=".html" style="display:none;">
      <button id="btn-export" class="nav-btn btn-export">코드 출력</button>
    </div>
  </header>

  <main class="works-list" id="works-list"></main>

  <!-- 추가/편집 모달 -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-box">
      <h2 id="modal-title" class="modal-title">새 작업물 추가</h2>

      <div class="form-group">
        <label class="form-label">이미지</label>
        <div class="image-upload-area">
          <input type="file" id="form-file" accept="image/*">
          <p class="image-upload-label">클릭하여 이미지 선택</p>
          <img id="img-preview" class="image-preview" alt="미리보기">
        </div>
      </div>

      <div class="form-group">
        <label for="form-title" class="form-label">제목</label>
        <input type="text" id="form-title" class="form-input" placeholder="작업물 제목">
      </div>

      <div class="form-group">
        <label for="form-desc" class="form-label">설명</label>
        <textarea id="form-desc" class="form-textarea" placeholder="작업물 설명을 입력하세요"></textarea>
      </div>

      <div class="modal-actions">
        <button id="btn-cancel" class="nav-btn btn-cancel">취소</button>
        <button id="btn-save"   class="nav-btn">저장</button>
      </div>
    </div>
  </div>

  <script src="js/works.js"></script>
  <script src="js/transition.js"></script>
</body>
</html>
